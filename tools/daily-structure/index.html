<h1>The Daily Structure</h1>
<p>Translate signal into structured action.</p>

<textarea id="input" rows="10" cols="80" placeholder="Paste an article, passage, or signal..."></textarea>

<br><br>

<button onclick="generate()">Generate</button>

<pre id="output"></pre>

<script>
async function generate() {

const input = document.getElementById("input").value;
const response = await fetch("https://daily-structure-worker.st63f.workers.dev",
{
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ input })
});

const data = await response.json();

document.getElementById("output").textContent = JSON.stringify(data, null, 2);

}
</script>
