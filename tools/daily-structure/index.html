<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>The Daily Structure | Hank Quellhorst</title>

<style>

body {
  font-family: system-ui, -apple-system, sans-serif;
  line-height: 1.6;
  margin: 0;
  background: #fafafa;
  color: #222;
}

nav {
  padding: 20px;
  border-bottom: 1px solid #eee;
}

nav a {
  margin-right: 20px;
  text-decoration: none;
  color: #333;
  font-weight: 500;
}

nav a:hover {
  text-decoration: underline;
}

.container {
  max-width: 720px;
  margin: 60px auto;
  padding: 0 20px;
}

h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.subtitle {
  color: #666;
  margin-bottom: 30px;
}

textarea {
  width: 100%;
  min-height: 140px;
  padding: 12px;
  font-size: 16px;
  border: 1px solid #ddd;
  resize: vertical;
}

button {
  margin-top: 12px;
  padding: 10px 16px;
  font-size: 15px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #333;
}

#output {
  margin-top: 40px;
}

#output h2 {
  margin-top: 28px;
  font-size: 20px;
}

#output ul {
  padding-left: 18px;
}

</style>

</head>

<body>

<nav>
<a href="/essays">Essays</a>
<a href="/apps">Apps</a>
<a href="/tools">Tools</a>
<a href="/inspiration">Inspiration</a>
</nav>

<main class="container">

<h1>The Daily Structure</h1>
<p class="subtitle">Translate signal into structured action.</p>

<textarea
id="input"
placeholder="Paste an article, passage, or signal..."
></textarea>

<br>

<button onclick="generate()">Generate</button>

<div id="output"></div>

</main>

<script>

async function generate() {

const input = document.getElementById("input").value;

const response = await fetch(
"https://daily-structure-worker.st63f.workers.dev",
{
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ input })
}
);

const data = await response.json();

const output = `
<h2>Anchor</h2>
<p>${data.anchor}</p>

<h2>Act</h2>
<ul>
${data.act.map(a => `<li>${a}</li>`).join("")}
</ul>

<h2>Avoid</h2>
<p>${data.avoid}</p>

<h2>Frame</h2>
<p>${data.frame}</p>

<h2>Reflection</h2>
<p>${data.reflection}</p>
`;

document.getElementById("output").innerHTML = output;

}

</script>

</body>

</html>
