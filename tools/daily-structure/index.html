<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>The Daily Structure | Hank Quellhorst</title>

<style>

:root {
  --red-dark: #7a0f14;
  --red-main: #a5141b;
  --red-light: #c91c23;
  --text-cream: #f3e6d3;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  padding: 3rem 1.5rem;
  display: flex;
  flex-direction: column;
  background: linear-gradient(135deg, var(--red-dark), var(--red-main), var(--red-light));
  font-family: 'Inter', sans-serif;
  color: var(--text-cream);
}

main {
  width: min(960px, 100%);
  margin: 0 auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2rem;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(3rem, 7vw, 5rem);
  font-weight: 400;
  letter-spacing: -1px;
}

.section-intro {
  max-width: 56ch;
  font-size: 1rem;
  line-height: 1.7;
  opacity: 0.88;
}

.tool-container {
  border: 1px solid rgba(243, 230, 211, 0.28);
  border-radius: 12px;
  background: rgba(122, 15, 20, 0.12);
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

textarea {
  width: 100%;
  min-height: 140px;
  padding: 12px;
  font-size: 15px;
  border-radius: 8px;
  border: 1px solid rgba(243, 230, 211, 0.28);
  background: rgba(0,0,0,0.15);
  color: var(--text-cream);
}

button {
  align-self: flex-start;
  padding: 10px 18px;
  border-radius: 6px;
  border: none;
  background: var(--text-cream);
  color: var(--red-dark);
  font-weight: 500;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

#output h2 {
  margin-top: 1.5rem;
  font-family: 'Playfair Display', serif;
  font-weight: 400;
}

#output ul {
  padding-left: 20px;
}

.home-link {
  width: min(960px, 100%);
  margin: 0 auto;
  padding-top: 1rem;
  font-size: 0.95rem;
}

.home-link a {
  color: var(--text-cream);
  text-decoration: none;
  opacity: 0.75;
}

.home-link a:hover {
  opacity: 1;
}

</style>

</head>

<body>

<nav>
<a href="/essays">Essays</a>
<a href="/apps">Apps</a>
<a href="/tools">Tools</a>
<a href="/inspiration">Inspiration</a>
</nav>

<main class="container">

    <main>

    <h1>The Daily Structure</h1>

    <p class="section-intro">
    Translate signal into structured action.
    </p>

    <div class="tool-container">

    <textarea
    id="input"
    placeholder="Paste an article, passage, or signal..."
    ></textarea>

    <button onclick="generate()">Generate</button>

    <div id="output"></div>

    </div>

    </main>

    <div class="home-link">
    <a href="/">← Home</a>
    </div>

<script>

async function generate() {

const input = document.getElementById("input").value;

const response = await fetch(
"https://daily-structure-worker.st63f.workers.dev",
{
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ input })
}
);

const data = await response.json();

const output = `
<h2>Anchor</h2>
<p>${data.anchor}</p>

<h2>Act</h2>
<ul>
${data.act.map(a => `<li>${a}</li>`).join("")}
</ul>

<h2>Avoid</h2>
<p>${data.avoid}</p>

<h2>Frame</h2>
<p>${data.frame}</p>

<h2>Reflection</h2>
<p>${data.reflection}</p>
`;

document.getElementById("output").innerHTML = output;

}

</script>

</body>

</html>
