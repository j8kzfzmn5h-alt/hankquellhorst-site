<h1>The Daily Structure</h1>
<p>Translate signal into structured action.</p>

<textarea id="input" rows="10" cols="80" placeholder="Paste an article, passage, or signal..."></textarea>

<br><br>

<button onclick="generate()">Generate</button>

<div id="output"></div>

<script>
async function generate() {

const input = document.getElementById("input").value;

const response = await fetch(
"https://daily-structure-worker.st63f.workers.dev",
{
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ input })
});

const data = await response.json();

const output = `
<h2>Anchor</h2>
<p>${data.anchor}</p>

<h2>Act</h2>
<ul>
${data.act.map(a => `<li>${a}</li>`).join("")}
</ul>

<h2>Avoid</h2>
<p>${data.avoid}</p>

<h2>Frame</h2>
<p>${data.frame}</p>

<h2>Reflection</h2>
<p>${data.reflection}</p>
`;

document.getElementById("output").innerHTML = output;

}
</script>

</body>
</html>
